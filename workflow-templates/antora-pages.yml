# Antora build + deploy to GitHub Pages (Root Strategy).
# Requires: antora-playbook.yml at repo root, docs/ with antora.yml.
# Repo Settings → Pages → Source: GitHub Actions.
name: Docs

on:
  push:
    branches: [ $default-branch ]
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [ $default-branch ]
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
      - '.github/workflows/*.yml'
  workflow_dispatch:
  repository_dispatch:
    types: [extension-updated]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build docs
        run: pnpm dlx antora antora-playbook.yml

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/site

  deploy:
    if: github.ref == 'refs/heads/$default-branch' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
